<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Favorite Music</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Helvetica, sans-serif;
}

body {
    background-color: #DDE4EC;
    padding-top: 90px;
}

/* HEADER */
header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 70px;
    background-color: #1B1B2E;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 50px;
    z-index: 1000;
}

header .logo a {
    color: white;
    font-size: 22px;
    text-decoration: none;
    font-weight: bold;
}

header nav a {
    color: white;
    text-decoration: none;
    margin-left: 20px;
    font-size: 15px;
}

header nav a:hover {
    text-decoration: underline;
}

/* MAIN CONTAINER */
.container {
    width: 75%;
    max-width: 900px;
    margin: 40px auto;
    background: white;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}

.container h1 {
    text-align: center;
    margin-bottom: 30px;
    color: #1B1B2E;
}

/* MUSIC CARD */
.music-card {
    display: flex;
    gap: 25px;
    align-items: center;
    margin-bottom: 35px;
    padding: 20px;
    border-radius: 10px;
    background-color: #F8F9FC;
}

.music-card img {
    width: 180px;
    border-radius: 10px;
}

.music-info {
    flex: 1;
}

.music-info h2 {
    margin-bottom: 8px;
    color: #1B1B2E;
}

.music-info p {
    margin-bottom: 6px;
    font-size: 14px;
    color: #333;
}

audio {
    margin-top: 10px;
    width: 100%;
}

/* PAGE NAVIGATION */
.page-navigation {
    display: flex;
    justify-content: flex-end;
    margin-top: 30px;
}

.page-navigation a {
    text-decoration: none;
    background-color: #1B1B2E;
    color: white;
    padding: 10px 18px;
    border-radius: 6px;
    transition: 0.3s;
    font-size: 14px;
}

.page-navigation a:hover {
    background-color: #3F3F5E;
}

/* RESPONSIVE */
@media(max-width: 768px){
    .container {
        width: 90%;
        padding: 25px;
    }

    .music-card {
        flex-direction: column;
        text-align: center;
    }

    .music-card img {
        width: 200px;
    }

    header {
        padding: 0 20px;
    }
}
</style>
</head>

<body>

<header>
    <div class="logo">
        <a href="index.html">HOME</a>
    </div>
    <nav>
        <a href="BIOGRAPHY.html">Biography</a>
        <a href="TECH.html">Blogs</a>
    </nav>
</header>

<div class="container">
    <h1>🎵 My Favorite Music</h1>

    <div class="music-card">
        <img src="multo.png" alt="Multo Album Cover">
        <div class="music-info">
            <h2>Multo</h2>
            <p><strong>Artist:</strong> Cup of Joe</p>
            <p><strong>Genre:</strong> OPM / Pop Rock</p>
            <p><strong>Album:</strong> Silakbo</p>
            <audio controls>
                <source src="Multo.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
        </div>
    </div>

    <div class="music-card">
        <img src="mundo.jpg" alt="Mundo Album Cover">
        <div class="music-info">
            <h2>Mundo</h2>
            <p><strong>Artist:</strong> IV of Spades</p>
            <p><strong>Genre:</strong> Pop Rock / Indie</p>
            <p><strong>Album:</strong> Mundo</p>
            <audio controls>
                <source src="Mundo.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
        </div>
    </div>

    <div class="page-navigation">
        <a href="MOVIES.html">Next Page →</a>
    </div>

</div>

</body>
</html>
