<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Favorite Beats</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Helvetica, sans-serif;
}

body {
    background-color: #DDE4EC;
    padding-top: 90px;
}

header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 70px;
    background-color: #1B1B2E;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 50px;
    z-index: 1000;
}

.logo a {
    font-size: 22px;
    font-weight: bold;
    color: white;
    text-decoration: none;
}

header nav a {
    color: white;
    text-decoration: none;
    margin-left: 20px;
    font-size: 15px;
}

header nav a:hover {
    text-decoration: underline;
}

.container {
    width: 75%;
    max-width: 1000px;
    margin: 40px auto;
    background: white;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}

.container h1 {
    text-align: center;
    margin-bottom: 35px;
    color: #1B1B2E;
}

.music-card {
    margin-bottom: 30px;
    padding: 20px;
    background-color: #F8F9FC;
    border-radius: 12px;
    transition: 0.3s ease;
}

.music-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 6px 15px rgba(0,0,0,0.08);
}

.music-card h2 {
    margin-bottom: 10px;
    color: #1B1B2E;
}

.music-card p {
    margin-bottom: 10px;
    font-size: 14px;
    color: #333;
}

iframe {
    width: 100%;
    height: 120px;
    border-radius: 8px;
    border: none;
}

.page-navigation {
    display: flex;
    justify-content: space-between;
    margin-top: 30px;
}

.page-navigation a {
    text-decoration: none;
    background-color: #1B1B2E;
    color: white;
    padding: 10px 18px;
    border-radius: 6px;
    transition: 0.3s;
    font-size: 14px;
}

.page-navigation a:hover {
    background-color: #3F3F5E;
}

@media(max-width: 768px){

    .container {
        width: 90%;
        padding: 25px;
    }

    header {
        padding: 0 20px;
    }

    iframe {
        height: 100px;
    }
}
</style>
</head>

<body>

<header>
    <div class="logo">
        <a href="index.html">HOME</a>
    </div>
    <nav>
        <a href="MEDIA.html">Media</a>
        <a href="BIOGRAPHY.html">Biography</a>
        <a href="TECH.html">Blogs</a>
    </nav>
</header>

<div class="container">
    <h1>🎵 My Favorite Beats</h1>

    <div class="music-card">
        <h2>Sample Beat Title 1</h2>
        <p><strong>Artist:</strong> Artist Name</p>
        <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
    </div>

    <div class="music-card">
        <h2>Sample Beat Title 2</h2>
        <p><strong>Artist:</strong> Artist Name</p>
        <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
    </div>


    <div class="page-navigation">
        <a href="MEDIA.html">← Back to Media Hub</a>
        <a href="MOVIES.html">Next Page →</a>
    </div>

</div>

</body>
</html>
