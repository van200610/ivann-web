<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Gallery</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Helvetica, sans-serif;
}

body {
    background-color: #DDE4EC;
    padding-top: 90px;
}

header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 70px;
    background-color: #1B1B2E;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 50px;
    z-index: 1000;
}

.logo a {
    font-size: 22px;
    font-weight: bold;
    color: white;
    text-decoration: none;
}

header nav a {
    color: white;
    text-decoration: none;
    margin-left: 20px;
    font-size: 15px;
}

header nav a:hover {
    text-decoration: underline;
}

h2 {
    margin-top: 40px;
    text-align: center;
    color: #1B1B2E;
}

.collection {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 15px;
    padding: 20px 60px;
}

.collection a {
    display: block;
}

.collection img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 8px;
    transition: transform 0.3s ease;
}

.collection img:hover {
    transform: scale(1.05);
}

.top-link {
    text-align: center;
    margin: 30px 0 50px;
}

.top-link a {
    text-decoration: none;
    font-weight: bold;
    color: #1B1B2E;
}

.top-link a:hover {
    color: crimson;
}

@media(max-width: 768px) {
    .collection {
        padding: 20px;
    }

    header {
        padding: 0 20px;
    }
}
</style>
</head>
